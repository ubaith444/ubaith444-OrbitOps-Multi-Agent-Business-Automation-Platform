name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Backend · lint and test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Ruff lint
        run: ruff check app tests
      - name: Pytest with coverage
        run: pytest --cov=app --cov-report=term-missing --cov-report=xml
        env:
          APP_ENV: test
          DATABASE_URL: sqlite+aiosqlite:///./test.db
          APP_SECRET_KEY: test-only-ci-secret-with-at-least-32-characters
          BOOTSTRAP_ADMIN_PASSWORD: TestOnly-Password-123!
          EMAIL_WEBHOOK_SECRET: test-only-email-webhook-secret-32
          WHATSAPP_WEBHOOK_SECRET: test-only-whatsapp-webhook-secret-32
      - uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: apps/api/coverage.xml

  frontend:
    name: Frontend · typecheck and build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with:
          version: 10.12.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm build

  e2e:
    name: Browser · Playwright
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    timeout-minutes: 25
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
        working-directory: apps/api
      - uses: pnpm/action-setup@v6
        with:
          version: 10.12.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm build
      - run: pnpm test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-failure-artifacts
          path: |
            apps/web/test-results
            apps/web/playwright-report

  containers:
    name: Containers · Compose build
    runs-on: ubuntu-latest
    needs: [backend, frontend, e2e]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - run: cp .env.example .env
      - run: docker compose -f docker-compose.yml config --quiet
      - run: docker compose -f docker-compose.yml build
