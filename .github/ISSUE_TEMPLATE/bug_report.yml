name: Bug report
description: Report a reproducible OrbitOps defect
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not include credentials, tokens, customer data, or private webhook payloads.
  - type: input
    id: version
    attributes:
      label: Version or commit
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options: [API, Web, Agents, Approvals, Communications, Reports, Deployment, Documentation]
    validations:
      required: true
