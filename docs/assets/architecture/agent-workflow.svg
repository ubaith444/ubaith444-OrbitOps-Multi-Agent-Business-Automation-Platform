<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="620" viewBox="0 0 1600 620" role="img" aria-labelledby="title desc">
  <title id="title">OrbitOps LangGraph workflow</title><desc id="desc">The production workflow routes a lead through sales scoring, company research, email drafting, human approval, and report generation with retry and resume.</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#080d16"/><stop offset="1" stop-color="#111827"/></linearGradient><linearGradient id="blue" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#2563eb"/><stop offset="1" stop-color="#4f46e5"/></linearGradient><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10z" fill="#5e7898"/></marker><filter id="s"><feDropShadow dx="0" dy="8" stdDeviation="12" flood-opacity=".3"/></filter><style>.h{font:700 32px Inter,Segoe UI,sans-serif;fill:#f8fafc}.sub{font:400 15px Inter,Segoe UI,sans-serif;fill:#8da0b8}.n{font:700 17px Inter,Segoe UI,sans-serif;fill:#f8fafc}.m{font:400 12px Inter,Segoe UI,sans-serif;fill:#8291a7}.num{font:700 13px Inter,Segoe UI,sans-serif;fill:#fff}.edge{stroke:#5e7898;stroke-width:2;fill:none;marker-end:url(#a)}.dash{stroke:#f97316;stroke-width:2;stroke-dasharray:8 8;fill:none;marker-end:url(#a)}</style></defs>
  <rect width="1600" height="620" rx="28" fill="url(#bg)"/><text x="70" y="72" class="h">Approval-first agent workflow</text><text x="70" y="101" class="sub">Durable state · deterministic policy · human control · retry from the failed node</text>
  <g filter="url(#s)"><rect x="70" y="196" width="240" height="168" rx="18" fill="#101a29" stroke="#26364b"/><circle cx="105" cy="230" r="18" fill="url(#blue)"/><text x="105" y="235" text-anchor="middle" class="num">1</text><text x="137" y="235" class="n">Sales Agent</text><text x="94" y="276" class="m">Deterministic lead scoring</text><text x="94" y="300" class="m">Priority + qualification</text><rect x="94" y="326" width="91" height="22" rx="11" fill="#10b981" opacity=".13"/><text x="139" y="341" text-anchor="middle" font-family="Inter,Segoe UI" font-size="11" font-weight="700" fill="#34d399">NO LLM COST</text></g>
  <g filter="url(#s)"><rect x="366" y="196" width="240" height="168" rx="18" fill="#101a29" stroke="#26364b"/><circle cx="401" cy="230" r="18" fill="url(#blue)"/><text x="401" y="235" text-anchor="middle" class="num">2</text><text x="433" y="235" class="n">Research Agent</text><text x="390" y="276" class="m">Company intelligence</text><text x="390" y="300" class="m">Evidence + risk labels</text><rect x="390" y="326" width="114" height="22" rx="11" fill="#8b5cf6" opacity=".14"/><text x="447" y="341" text-anchor="middle" font-family="Inter,Segoe UI" font-size="11" font-weight="700" fill="#a78bfa">MULTI-LLM ROUTE</text></g>
  <g filter="url(#s)"><rect x="662" y="196" width="240" height="168" rx="18" fill="#101a29" stroke="#26364b"/><circle cx="697" cy="230" r="18" fill="url(#blue)"/><text x="697" y="235" text-anchor="middle" class="num">3</text><text x="729" y="235" class="n">Email Agent</text><text x="686" y="276" class="m">Personalized draft</text><text x="686" y="300" class="m">Follow-up sequence</text><rect x="686" y="326" width="116" height="22" rx="11" fill="#3b82f6" opacity=".14"/><text x="744" y="341" text-anchor="middle" font-family="Inter,Segoe UI" font-size="11" font-weight="700" fill="#60a5fa">DRAFT ONLY</text></g>
  <g filter="url(#s)"><rect x="958" y="174" width="240" height="212" rx="18" fill="#21180c" stroke="#a16207"/><circle cx="993" cy="210" r="18" fill="#f59e0b"/><text x="993" y="215" text-anchor="middle" class="num">4</text><text x="1025" y="215" class="n">Human Approval</text><text x="982" y="258" class="m">Approve · Reject</text><text x="982" y="282" class="m">Request changes</text><rect x="982" y="312" width="143" height="25" rx="12" fill="#f59e0b" opacity=".16"/><text x="1053" y="329" text-anchor="middle" font-family="Inter,Segoe UI" font-size="11" font-weight="700" fill="#fbbf24">IDEMPOTENT GATE</text><text x="982" y="365" font-family="Inter,Segoe UI" font-size="11" fill="#b9a071">No outbound action without policy approval</text></g>
  <g filter="url(#s)"><rect x="1254" y="196" width="240" height="168" rx="18" fill="#101a29" stroke="#26364b"/><circle cx="1289" cy="230" r="18" fill="url(#blue)"/><text x="1289" y="235" text-anchor="middle" class="num">5</text><text x="1321" y="235" class="n">Report Agent</text><text x="1278" y="276" class="m">Executive summary</text><text x="1278" y="300" class="m">PDF + audit evidence</text><rect x="1278" y="326" width="122" height="22" rx="11" fill="#10b981" opacity=".13"/><text x="1339" y="341" text-anchor="middle" font-family="Inter,Segoe UI" font-size="11" font-weight="700" fill="#34d399">COMPLETED</text></g>
  <path d="M310 280H366" class="edge"/><path d="M606 280H662" class="edge"/><path d="M902 280H958" class="edge"/><path d="M1198 280H1254" class="edge"/>
  <path d="M1078 386V462H782V366" class="dash"/><text x="920" y="489" text-anchor="middle" font-family="Inter,Segoe UI" font-size="12" font-weight="700" fill="#fb923c">REQUEST CHANGES → RE-DRAFT</text>
  <path d="M486 364V535H1374V365" stroke="#ef4444" stroke-width="2" stroke-dasharray="7 7" fill="none" marker-end="url(#a)"/><rect x="675" y="514" width="310" height="42" rx="21" fill="#2a1218" stroke="#7f1d1d"/><text x="830" y="540" text-anchor="middle" font-family="Inter,Segoe UI" font-size="12" font-weight="700" fill="#fb7185">FAILURE → DURABLE SNAPSHOT → RETRY / RESUME</text>
  <text x="70" y="588" class="m">Each node records duration, attempts, provider/model, token usage, cost, evaluation, and audit events.</text><text x="1495" y="588" text-anchor="end" class="m">OrbitOps · Ubaith444</text>
</svg>
